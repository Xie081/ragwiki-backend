spring:
  application:
    name: personal-project-web2026

  # Datasource — defaults to local PostgreSQL; override via env vars for Docker/production
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rag_wiki}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

  # File upload
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Devtools
  devtools:
    restart:
      enabled: true

  # Spring AI — DeepSeek for chat + SiliconFlow for embedding
  ai:
    openai:
      # DeepSeek chat
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      chat:
        enabled: true
        options:
          model: ${AI_CHAT_MODEL:deepseek-v4-pro}
      # SiliconFlow embedding (OpenAI-compatible)
      embedding:
        enabled: true
        base-url: https://api.siliconflow.cn/v1
        api-key: ${SILICONFLOW_API_KEY:}
        options:
          model: BAAI/bge-m3

# Server
server:
  port: 8080

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# App custom config
app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-random-secret-key-at-least-256-bits-long}
    expiration-ms: 86400000  # 24 hours
  upload:
    dir: ${UPLOAD_DIR:./uploads}

logging:
  level:
    cs.sbs.web: INFO
